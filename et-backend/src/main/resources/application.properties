spring.application.name=expenseiq-backend

server.port=${ET_SERVER_PORT}

spring.datasource.url=${ET_DB_URL}
spring.datasource.username=${ET_DB_USERNAME}
spring.datasource.password=${ET_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

app.security.jwt.secret=${ET_JWT_SECRET}
app.security.jwt.access-token-expiration-ms=${ET_JWT_ACCESS_TOKEN_EXPIRATION_MS}
app.security.jwt.refresh-token-expiration-ms=${ET_JWT_REFRESH_TOKEN_EXPIRATION_MS}
app.security.jwt.issuer=${ET_JWT_ISSUER}

app.security.password.bcrypt-strength=${ET_BCRYPT_STRENGTH}

app.cors.allowed-origins=${ET_CORS_ALLOWED_ORIGINS}

app.dashboard.recent-transaction-limit=${ET_DASHBOARD_RECENT_TRANSACTION_LIMIT:6}

app.oauth.frontend-base-url=${ET_FRONTEND_BASE_URL:http://localhost:5173}

app.oauth.google.enabled=${ET_OAUTH_GOOGLE_ENABLED:false}
app.oauth.google.client-id=${ET_OAUTH_GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${ET_OAUTH_GOOGLE_CLIENT_SECRET:}

app.oauth.facebook.enabled=${ET_OAUTH_FACEBOOK_ENABLED:false}
app.oauth.facebook.client-id=${ET_OAUTH_FACEBOOK_CLIENT_ID:}
app.oauth.facebook.client-secret=${ET_OAUTH_FACEBOOK_CLIENT_SECRET:}

app.oauth.linkedin.enabled=${ET_OAUTH_LINKEDIN_ENABLED:false}
app.oauth.linkedin.client-id=${ET_OAUTH_LINKEDIN_CLIENT_ID:}
app.oauth.linkedin.client-secret=${ET_OAUTH_LINKEDIN_CLIENT_SECRET:}

app.analytics.default-months=${ANALYTICS_DEFAULT_MONTHS:6}
app.analytics.max-range-days=${ANALYTICS_MAX_RANGE_DAYS:1095}
app.analytics.top-category-limit=${ANALYTICS_TOP_CATEGORY_LIMIT:5}
app.analytics.top-account-limit=${ANALYTICS_TOP_ACCOUNT_LIMIT:5}

# Receipt attachment storage
app.storage.receipts.base-path=${EXPENSEIQ_RECEIPT_STORAGE_PATH:D:/ExpenseIQ/storage/receipts}
app.storage.receipts.max-file-size-bytes=${EXPENSEIQ_RECEIPT_MAX_FILE_SIZE_BYTES:5242880}
app.storage.receipts.allowed-content-types=${EXPENSEIQ_RECEIPT_ALLOWED_CONTENT_TYPES:image/png,image/jpeg,image/webp,application/pdf}
spring.servlet.multipart.max-file-size=${EXPENSEIQ_RECEIPT_MULTIPART_MAX_FILE_SIZE:6MB}
spring.servlet.multipart.max-request-size=${EXPENSEIQ_RECEIPT_MULTIPART_MAX_REQUEST_SIZE:6MB}

# Login protection
app.security.login.max-failed-attempts=${ET_SECURITY_LOGIN_MAX_FAILED_ATTEMPTS:5}
app.security.login.lock-duration-minutes=${ET_SECURITY_LOGIN_LOCK_DURATION_MINUTES:15}
app.security.login.rate-limit-window-seconds=${ET_SECURITY_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.login.max-attempts-per-window=${ET_SECURITY_LOGIN_MAX_ATTEMPTS_PER_WINDOW:10}
